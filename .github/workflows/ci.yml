name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v6
  
    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: 22
        cache: 'pnpm'
  
    - name: Instalar pnpm
      run: npm install -g pnpm
  
    - name: Instalar dependências
      run: pnpm install --frozen-lockfile
  
    - name: Rodar lint
      run: pnpm lint
  
    - name: Rodar build
      run: pnpm build
